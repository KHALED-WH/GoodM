<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Good Margin — إنشاء حساب</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div id="global-header"></div>

  <h1 class="page-title">انضم إلى Good Margin!</h1>
  <h3 class="page-subtitle">أنشئ حسابك الآن وابدأ في تحسين هوامش أرباحك وتحديد أسعار منتجاتك بذكاء.</h3>

  <div class="card">

    <i class="fa-solid fa-user-plus icon-hero text-secondary"></i>

    <form id="signupForm" novalidate>

      <div style="display: flex; gap: 14px; margin-bottom: 20px;">
        <div style="flex: 1;">
          <label class="field-label" for="firstName">الاسم الأول</label>
          <input id="firstName" class="input" type="text" placeholder="الاسم الأول" required>
        </div>
        <div style="flex: 1;">
          <label class="field-label" for="lastName">اسم العائلة</label>
          <input id="lastName" class="input" type="text" placeholder="اسم العائلة" required>
        </div>
      </div>

      <div class="form-group">
        <label class="field-label" for="email">البريد الإلكتروني</label>
        <input id="email" class="input" type="email" placeholder="example@example.com" required>
      </div>

      <div class="form-group">
        <label class="field-label" for="pass1">كلمة المرور</label>
        <input id="pass1" class="input" type="password" placeholder="8 خانات على الأقل" minlength="8" required>
      </div>

      <div class="form-group">
        <label class="field-label" for="pass2">تأكيد كلمة المرور</label>
        <input id="pass2" class="input" type="password" placeholder="أدخل كلمة المرور مجدداً" required>
        <p id="passError" class="field-error" role="alert" aria-live="polite"></p>
      </div>

      <button type="submit" class="btn btn-primary">إنشاء الحساب</button>
      <button type="reset" class="btn btn-ghost">مسح البيانات</button>
    </form>

    <p class="text-center mt-md" style="font-size: 0.92rem;">
      لديك حساب بالفعل؟
      <a href="login.html" style="color: var(--primary); font-weight: 600; text-decoration: underline;">سجل دخولك هنا</a>
    </p>

  </div>

  <footer>
    <p>&copy; 2026 جميع الحقوق محفوظة لمنصة Good Margin</p>
  </footer>

  <script>
    // Load shared header
    fetch('header.html')
      .then(r => r.text())
      .then(html => {
        document.getElementById('global-header').innerHTML = html;
        document.querySelectorAll('.navbar-item a').forEach(link => {
          if (link.getAttribute('href') === 'signup.html') link.parentElement.classList.add('active');
        });
      })
      .catch(console.error);

    // Password validation
    const form    = document.getElementById('signupForm');
    const pass1   = document.getElementById('pass1');
    const pass2   = document.getElementById('pass2');
    const errMsg  = document.getElementById('passError');

    pass2.addEventListener('input', () => {
      if (pass2.value && pass2.value !== pass1.value) {
        errMsg.textContent = '⚠️ كلمات المرور غير متطابقة';
        pass2.style.borderColor = 'var(--error)';
      } else {
        errMsg.textContent = '';
        pass2.style.borderColor = '';
      }
    });

    form.addEventListener('submit', e => {
      e.preventDefault();

      if (pass1.value !== pass2.value) {
        errMsg.textContent = '⚠️ كلمات المرور غير متطابقة، يرجى التأكد!';
        pass2.style.borderColor = 'var(--error)';
        pass2.focus();
        return;
      }

      alert('🎉 تم إنشاء الحساب بنجاح! سيتم تحويلك لصفحة تسجيل الدخول.');
      window.location.href = 'login.html';
    });
  </script>

</body>
</html>
