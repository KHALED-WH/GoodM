<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Good Margin — تسجيل الدخول</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div id="global-header"></div>

  <h1 class="page-title">مرحباً بك مجدداً!</h1>
  <h3 class="page-subtitle">سجل دخولك الآن لمراقبة بياناتك وتحليل أسعار منتجاتك في السوق.</h3>

  <div class="card">

    <i class="fa-solid fa-circle-user icon-hero text-primary"></i>

    <form id="loginForm" method="post" action="index.html">

      <div class="form-group">
        <label class="field-label" for="username">اسم المستخدم أو البريد الإلكتروني</label>
        <input class="input" type="text" id="username" name="username" placeholder="أدخل اسم المستخدم" required>
      </div>

      <div class="form-group">
        <label class="field-label" for="password">كلمة المرور</label>
        <input class="input" type="password" id="password" name="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary">تسجيل الدخول</button>
    </form>

    <p class="text-center mt-md" style="font-size: 0.92rem;">
      ليس لديك حساب؟
      <a href="signup.html" style="color: var(--secondary); font-weight: 600; text-decoration: underline;">أنشئ حساباً جديداً</a>
    </p>

    <div class="divider-top text-center">
      <p style="font-size: 0.88rem; color: var(--text-sub); margin-bottom: 14px; font-weight: 500;">أو تواصل معنا عبر</p>
      <div class="social-links">
        <a href="mailto:support@goodmargin.com" title="البريد الإلكتروني">
          <i class="fa-solid fa-envelope"></i>
        </a>
        <a href="https://x.com" target="_blank" title="منصة X" class="x-twitter">
          <i class="fa-brands fa-x-twitter"></i>
        </a>
        <a href="https://wa.me/966500000000" target="_blank" title="واتساب" class="whatsapp">
          <i class="fa-brands fa-whatsapp"></i>
        </a>
      </div>
    </div>

  </div>

  <footer>
    <p>&copy; 2026 جميع الحقوق محفوظة لمنصة Good Margin</p>
  </footer>

  <script>
    // Load shared header
    fetch('header.html')
      .then(r => { if (!r.ok) throw new Error('header load failed'); return r.text(); })
      .then(html => {
        document.getElementById('global-header').innerHTML = html;
        document.querySelectorAll('.navbar-item a').forEach(link => {
          if (link.getAttribute('href') === 'login.html') link.parentElement.classList.add('active');
        });
      })
      .catch(console.error);
  </script>

</body>
</html>
