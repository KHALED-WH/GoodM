<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Margin - تسجيل الدخول</title>
    <link rel="stylesheet" href="GM-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="global-header"></div>

    <h1 class="head1">مرحباً بك مجدداً!</h1>
    <h3 class="head2">سجل دخولك الآن لمراقبة بياناتك وتحليل أسعار منتجاتك في السوق.</h3>

    <div class="container-card">
        
        <div style="text-align: center; margin-bottom: 25px; color: var(--primary);">
            <i class="fa-solid fa-circle-user" style="font-size: 5rem; filter: drop-shadow(0 10px 15px rgba(66, 206, 96, 0.2));"></i>
        </div>

        <form id="loginForm" method="post" action="home.html">
            <div class="form-group">
                <label class="field-label" for="UserName">اسم المستخدم أو البريد الإلكتروني</label>
                <input class="input" type="text" id="UserName" placeholder="أدخل اسم المستخدم" required>
            </div>

            <div class="form-group">
                <label class="field-label" for="UserPassword">كلمة المرور</label>
                <input class="input" type="password" id="UserPassword" placeholder="********" required>
            </div>

            <button type="submit" class="button">تسجيل الدخول</button>
        </form>

        <p class="head2" style="margin-top: 20px; font-size: 0.95rem;">
            ليس لديك حساب؟ <a href="sign_up.html" style="color: var(--secondary); font-weight: 600; text-decoration: underline;">أنشئ حساباً جديداً</a>
        </p>

        <div style="margin-top: 30px; text-align: center; border-top: 1px solid #e2e8f0; padding-top: 20px;">
            <p style="font-size: 0.9rem; color: #64748b; margin-bottom: 15px; font-weight: 500;">أو تواصل معنا عبر</p>
            <div style="display: flex; justify-content: center; gap: 20px;">
                <a href="mailto:support@goodmargin.com" title="البريد الإلكتروني" style="color: #64748b; font-size: 1.8rem; transition: var(--transition);">
                    <i class="fa-solid fa-envelope" onmouseover="this.style.color='#0097B2'" onmouseout="this.style.color='#64748b'"></i>
                </a>
                <a href="https://x.com" target="_blank" title="منصة X" style="color: #64748b; font-size: 1.8rem; transition: var(--transition);">
                    <i class="fa-brands fa-x-twitter" onmouseover="this.style.color='#111827'" onmouseout="this.style.color='#64748b'"></i>
                </a>
                <a href="https://wa.me/966500000000" target="_blank" title="واتساب" style="color: #64748b; font-size: 1.8rem; transition: var(--transition);">
                    <i class="fa-brands fa-whatsapp" onmouseover="this.style.color='#25D366'" onmouseout="this.style.color='#64748b'"></i>
                </a>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 جميع الحقوق محفوظة لمنصة Good Margin لتسعير المنتجات الذكي</p>
    </footer>

    <script>
        fetch('header.html')
            .then(response => {
                if (!response.ok) throw new Error('فشل جلب ملف الهيدر');
                return response.text();
            })
            .then(data => {
                document.getElementById('global-header').innerHTML = data;
                
                // حركة ذكية لتحديد الصفحة الحالية كـ نشطة (Active) في القائمة
                const currentLinks = document.querySelectorAll('.navbar-item a');
                currentLinks.forEach(link => {
                    if(link.getAttribute('href') === 'log_in.html') {
                        link.parentElement.classList.add('active');
                    }
                });
            })
            .catch(err => console.error(err));
    </script>
</body>
</html>
